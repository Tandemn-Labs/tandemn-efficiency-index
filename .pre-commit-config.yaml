repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        types: [python]
      - id: ui-javascript-check
        name: UI JavaScript syntax check
        entry: node --check src/tandemn_efficiency_index/ui/app.js
        language: system
        files: ^src/tandemn_efficiency_index/ui/app\.js$
        pass_filenames: false
