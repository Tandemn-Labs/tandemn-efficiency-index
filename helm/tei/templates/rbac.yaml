{{- if .Values.serviceAccount.create }}
{{- $fullname := include "tei.fullname" . -}}
{{- $clusterName := include "tei.clusterScopedName" . -}}
{{- $serviceAccountName := include "tei.serviceAccountName" . -}}
{{- if and (eq .Values.discovery.mode "namespaces") (empty .Values.discovery.namespaces) -}}
{{- fail "discovery.namespaces must contain at least one namespace when discovery.mode=namespaces" -}}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $clusterName }}-crd-reader
  labels:
    {{- include "tei.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $clusterName }}-crd-reader
  labels:
    {{- include "tei.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $clusterName }}-crd-reader
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $clusterName }}-workload-reader
  labels:
    {{- include "tei.labels" . | nindent 4 }}
rules:
  - apiGroups: ["nvidia.com"]
    resources: ["dynamographdeployments", "dynamographdeploymentrequests"]
    verbs: ["get", "list"]
  - apiGroups: ["ray.io"]
    resources: ["rayservices"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
{{- if eq .Values.discovery.mode "cluster" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $clusterName }}-workload-reader
  labels:
    {{- include "tei.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $clusterName }}-workload-reader
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- else if eq .Values.discovery.mode "namespaces" }}
{{- range .Values.discovery.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $clusterName }}-workload-reader
  namespace: {{ . }}
  labels:
    {{- include "tei.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $clusterName }}-workload-reader
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- else }}
{{- fail "discovery.mode must be cluster or namespaces" }}
{{- end }}
{{- end }}
