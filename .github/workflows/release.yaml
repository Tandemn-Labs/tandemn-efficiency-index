name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      image: ${{ steps.release.outputs.image }}
      chart_registry: ${{ steps.release.outputs.chart_registry }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: azure/setup-helm@v4
      - name: Configure Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add nvidia https://nvidia.github.io/dcgm-exporter/helm-charts
          helm repo update
      - id: release
        name: Validate release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repository="${GITHUB_REPOSITORY#*/}"
          chart_version="$(sed -n 's/^version: //p' helm/tei/Chart.yaml | head -1)"
          app_version="$(sed -n 's/^appVersion: "\(.*\)"/\1/p' helm/tei/Chart.yaml | head -1)"
          python_version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)"
          test "$version" = "$chart_version"
          test "$version" = "$app_version"
          test "$version" = "$python_version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/$repository" >> "$GITHUB_OUTPUT"
          echo "chart_registry=oci://ghcr.io/$owner/charts" >> "$GITHUB_OUTPUT"
      - run: uv sync --frozen --group dev
      - run: uv run ruff format --check src tests smoketest
      - run: uv run ruff check src tests smoketest
      - run: uv run mypy src tests smoketest
      - run: uv run pytest
      - run: uv run pytest smoketest
      - run: go test ./...
      - run: go vet ./...
      - run: helm dependency build helm/tei
      - run: helm lint helm/tei
      - run: helm lint helm/tei --values helm/tei/values-production.yaml
      - run: >-
          helm template tei helm/tei
          --namespace tandemn-system
          > /dev/null
      - run: >-
          helm template tei helm/tei
          --namespace tandemn-system
          --values helm/tei/values-production.yaml
          > /dev/null

  image:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ${{ needs.validate.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Tandemn Efficiency Index
            org.opencontainers.image.description=Kubernetes GPU inference workload observability
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ needs.validate.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  chart:
    needs:
      - validate
      - image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Configure Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add nvidia https://nvidia.github.io/dcgm-exporter/helm-charts
          helm repo update
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: helm dependency build helm/tei
      - run: mkdir -p dist
      - run: >-
          helm package helm/tei
          --destination dist
          --version "${{ needs.validate.outputs.version }}"
          --app-version "${{ needs.validate.outputs.version }}"
      - run: >-
          helm push
          "dist/tei-${{ needs.validate.outputs.version }}.tgz"
          "${{ needs.validate.outputs.chart_registry }}"
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          if-no-files-found: error

  cli:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: linux
            goarch: arm64
            extension: ""
          - goos: darwin
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: arm64
            extension: ""
          - goos: windows
            goarch: amd64
            extension: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p build dist
          binary="tei${{ matrix.extension }}"
          go build -trimpath \
            -ldflags="-s -w -X github.com/tandemn-labs/tandemn-efficiency-index/internal/cli.version=${VERSION}" \
            -o "build/$binary" \
            ./cmd/tei
          if [ "$GOOS" = "windows" ]; then
            (cd build && zip "../dist/tei-${GOOS}-${GOARCH}.zip" "$binary")
          else
            tar -czf "dist/tei-${GOOS}-${GOARCH}.tar.gz" -C build "$binary"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  github-release:
    needs:
      - validate
      - image
      - chart
      - cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "!*.dockerbuild"
          merge-multiple: true
      - name: Add installers
        run: |
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
      - name: Write checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-assets/*
          --verify-tag
          --generate-notes
          --title "$GITHUB_REF_NAME"
